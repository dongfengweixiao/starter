name: starter
description: A minimal Flutter MVVM starter template for cross-platform development.
version: 1.0.0+1

publish_to: "none"

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  chinese_font_library: ^1.2.0
  collection: ^1.19.1
  cupertino_icons: ^1.0.8
  flex_color_picker: ^3.8.0
  flutter:
    sdk: flutter
  flutter_it: ^2.1.2
  flutter_launcher_icons: ^0.14.4
  flutter_localizations:
    sdk: flutter
  flutter_tabler_icons: ^1.43.0
  gtk: ^2.1.0
  handy_window: ^0.4.2
  intl: ^0.20.2
  package_info_plus: ^9.0.0
  path: ^1.9.1
  path_provider: ^2.1.5
  phoenix_theme:
    git:
      url: https://github.com/ubuntu-flutter-community/phoenix_theme
      ref: 7d22aba2841e522bf4c140e60e4a60f33c8f5aa6
  safe_change_notifier: ^0.4.0+1
  scroll_to_index: ^3.0.1
  shared_preferences: ^2.5.4
  system_theme: ^3.2.0
  url_launcher: ^6.3.2
  window_manager: ^0.5.1
  xdg_directories: ^1.1.0
  yaru: ^10.0.0
  yaru_window: ^0.2.2
  yaru_window_linux: ^0.2.2

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  generate: true
  uses-material-design: true
